<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="images/summit_bank_logo.png">
</head>
<body>
    <header>
        <nav class="top-nav">
            <div class="nav-logo">
                <img src="images/summit_bank_logo.png" alt="Logo" class="logo">
            </div>
            <div class="nav-links">
                <a href="customer.html">Dashboard</a>
                <a href="transfer.html">Transfers</a>
                <a href="bills.html">Bills</a>
                <a href="profile.html">Profile</a>
                <a href="index.html" id="Logout">Logout</a>
                <label class="switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider round"></span>
                </label>
            </div>
        </nav>
    </header>

     <div class="dashboard-wrapper">
        <section class="panel welcome-panel">
            <h2>Edit Profile</h2>
        </section>

        <div class="dashboard-main">
            <section class="panel profile-panel">
                <form id="profileForm">
                    <div class="textbox-form-group">
                        <label for="name">Name:</label>
                        <input type="text" class="textbox-form-input" id="profileUsername" name="name" required>
                    </div>
                    <div class="textbox-form-group">
                        <label for="email">Email:</label>
                        <input type="email" class="textbox-form-input" id="profileEmail" name="email" required>
                    </div>
                    <button type="button" class="submit-button" id="saveChanges">Save Changes</button>

                    <div id="profileUpdateMessage" style="display: none;">
                        <p id="profileUpdateMessageText"></p>
                    </div>
                </form>
            </section>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
