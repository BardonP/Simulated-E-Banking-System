<!DOCTYPE html>
<html>
<head>
    <title>Bill Payments</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="images/summit_bank_logo.png">
</head>
<body>
    <header>
        <nav class="top-nav">
            <div class="nav-logo">
                <img src="images/summit_bank_logo.png" alt="Logo" class="logo">
            </div>
            <div class="nav-links">
                <a href="customer.html">Dashboard</a>
                <a href="transfer.html">Transfers</a>
                <a href="bills.html">Bills</a>
                <a href="profile.html">Profile</a>
                <a href="index.html" id="Logout">Logout</a>
            </div>
        </nav>
    </header>

    <div class="dashboard-wrapper">
        <section class="panel welcome-panel">
            <h2>Bill Payments</h2>
        </section>

        <div class="dashboard-main">
            <section class="panel table-panel">
                <h2>Make Bill Payment:</h2>
                <div class="textbox-form-group">
                    <label for="accountFrom">Payee:</label>
                    <input type="text" id="accountFrom" class="textbox-form-input" list="accountList" placeholder="Select or type account">
                </div>
                <div class="textbox-form-group">
                    <label for="accountTo">Due Date:</label>
                </div>
                <div class="textbox-form-group">
                    <label for="amount">Amount:</label>
                    <input type="number" id="amount" class="textbox-form-input" placeholder="$0.00" step="0.01" min="0">
                </div>
                <button class="submit-button">Submit Payment</button>
            </section>

            <section class="panel transactions-panel">
                <h3>Bills:</h3>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Payee</th>
                            <th>Amount</th>
                            <th>Due Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>

    
    <script src="app.js"></script>
</body>
</html>
