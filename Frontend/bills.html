<!DOCTYPE html>
<html>
<head>
    <title>Bill Payments</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="images/summit_bank_logo.png">
</head>
<body>
    <header>
        <nav class="top-nav">
            <div class="nav-logo">
                <img src="images/summit_bank_logo.png" alt="Logo" class="logo">
            </div>
            <div class="nav-links">
                <a href="customer.html">Dashboard</a>
                <a href="transfer.html">Transfers</a>
                <a href="bills.html">Bills</a>
                <a href="profile.html">Profile</a>
                <a href="index.html" id="Logout">Logout</a>
                <label class="switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider round"></span>
                </label>
            </div>
        </nav>
    </header>

    <div class="dashboard-wrapper">
        <section class="panel welcome-panel">
            <h2>Bill Payments</h2>
        </section>

        <div class="dashboard-main">
            <section class="panel table-panel">
                <h2>Make Bill Payment:</h2>
                <div class="textbox-form-group">
                    <label for="payee">Payee:</label>
                    <input type="text" id="payee" class="textbox-form-input" list="accountList" placeholder="Select or type account">
                </div>
                <div class="textbox-form-group" id="billDateMessage" style="display: none;">
                    <label for="billDueDate">Due Date:</label>
                    <p id="billDueDate"></p>
                </div>
                <div class="textbox-form-group">
                    <label for="billAmount">Amount:</label>
                    <input type="text" id="billAmount" class="textbox-form-input" placeholder="$0.00" step="0.01" min="0">
                </div>
                <button class="submit-button" id="submitBill">Submit Payment</button>

                <div id="billMessage" style="display: none;">
                    <p id="billMessageText"></p>
                </div>
            </section>

            <section class="panel transactions-panel">
                <h3>Bills:</h3>
                <table class="table" id="billsTable">
                    <thead>
                        <tr>
                            <th>Payee</th>
                            <th>Amount</th>
                            <th>Due Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Bills will be dynamically added here -->
                    </tbody>
                </table>
            </section>

            <datalist id="accountList">
                <!-- Payees loaded dynamically from bills -->
            </datalist>
        </div>

    <script src="app.js"></script>
</body>
</html>
