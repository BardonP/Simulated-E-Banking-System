<!DOCTYPE html>
<html>
<head>
    <title>Customer Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="images/summit_bank_logo.png">
</head>
<body>
    <header>
        <nav class="top-nav">
            <div class="nav-logo">
                <img src="images/summit_bank_logo.png" alt="Logo" class="logo">
            </div>
            <div class="nav-links">
                <a href="customer.html">Dashboard</a>
                <a href="transfer.html">Transfers</a>
                <a href="bills.html">Bills</a>
                <a href="profile.html">Profile</a>
                <a href="index.html" id="Logout">Logout</a>
            </div>
        </nav>
    </header>

    <div class="dashboard-wrapper">
        <section class="panel welcome-panel">
            <h2>Welcome, [Customer Name]!</h2>
        </section>

        <div class="dashboard-main">
            <section class="panel balances-panel">
                <h3>Account Balances:</h3>
                <div class="balance-boxes">
                    <div class="box">
                        <h4>Checking Account</h4>
                        <p>$1,500.00</p>
                    </div>
                    <div class="box">
                        <h4>Savings Account</h4>
                        <p>$5,000.00</p>
                    </div>
                </div>
            </section>

            <section class="panel transactions-panel">
                <h3>Recent Transactions:</h3>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>

        <section class="panel actions-panel">
            <div class="dashBtnRow">
                <button class="dashBtn"><a href="transfer.html">Transfer Funds</a></button>
                <button class="dashBtn"><a href="bills.html">Make Payments</a></button>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
