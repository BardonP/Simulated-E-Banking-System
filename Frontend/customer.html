<!DOCTYPE html>
<html>
<head>
    <title>Customer Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="images/summit_bank_logo.png">
</head>
<body>
    <header>
        <nav class="top-nav">
            <div class="nav-logo">
                <img src="images/summit_bank_logo.png" alt="Logo" class="logo">
            </div>
            <div class="nav-links">
                <a href="customer.html">Dashboard</a>
                <a href="transfer.html">Transfers</a>
                <a href="bills.html">Bills</a>
                <a href="profile.html">Profile</a>
                <a href="index.html">Logout</a>
            </div>
        </nav>
    </header>

    <h2>Welcome, [Customer Name]!</h2>

    <h3>Account Balances:</h3>
    <div class="grid">
				<div class="box">
					<h4>Checking Account</h4>
				</div>
				<div class="box">
                    <h4>Savings Account</h4>
				</div>
			</div>

    <h3>Recent Transactions:</h3>
    <table class="transaction-table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td></td>
            </tr>
        </tbody>
    </table>

    <script src="app.js"></script>
</body>
</html>
