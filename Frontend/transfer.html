<!DOCTYPE html>
<html>
<head>
    <title>Transfer Funds</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="images/summit_bank_logo.png">
</head>
<body>
    <header>
        <nav class="top-nav">
            <div class="nav-logo">
                <img src="images/summit_bank_logo.png" alt="Logo" class="logo">
            </div>
            <div class="nav-links">
                <a href="customer.html">Dashboard</a>
                <a href="transfer.html">Transfers</a>
                <a href="bills.html">Bills</a>
                <a href="profile.html">Profile</a>
                <a href="index.html" id="Logout">Logout</a>
            </div>
        </nav>
    </header>

    <div class="dashboard-wrapper">
        <div class="dashboard-main">
            <section class="panel actions-panel">
                <h2>Transfer Funds:</h2>
                <div class="transfer-form-group">
                    <label for="accountFrom">Account From:</label>
                    <input type="text" id="accountFrom" class="transfer-form-input" list="accountList" placeholder="Select or type account">
                </div>
                <div class="transfer-form-group">
                    <label for="accountTo">Account To:</label>
                    <input type="text" id="accountTo" class="transfer-form-input" list="accountList" placeholder="Select or type account">
                </div>
                <div class="transfer-form-group">
                    <label for="amount">Amount:</label>
                    <input type="number" id="amount" class="transfer-form-input" placeholder="$0.00" step="0.01" min="0">
                </div>
                <button class="transfer-button">Submit Transfer</button>
            </section>
        </div>

        <datalist id="accountList">
            <option value="Checking Account">
            <option value="Savings Account">
        </datalist>
    </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
