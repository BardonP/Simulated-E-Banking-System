<!DOCTYPE html>
<html>
<head>
    <title>Customer Search</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="images/summit_bank_logo.png">
</head>
<body>
    <header>
        <nav class="top-nav">
            <div class="nav-logo">
                <img src="images/summit_bank_logo.png" alt="Logo" class="logo">
            </div>
            <div class="nav-links">
                <a href="banker.html">Dashboard</a>
                <a href="customer_search.html">Search</a>
                <a href="index.html" id="Logout">Logout</a>
                <label class="switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider round"></span>
                </label>
            </div>
        </nav>
    </header>

     <div class="dashboard-wrapper">
        <section class="panel welcome-panel">
            <h2>Customer Search</h2>
        </section>

        <div class="dashboard-main">
            <section class="panel search-panel">
                <div class="textbox-form-group">
                    <label>Search Customer:</label>
                    <input type="text" class="textbox-form-input" id="customerSearchInput" placeholder="Enter customer name or ID" list="customerSuggestions">
                    <button class="submit-button" id="customerSearchSearch">Search</button>
                </div>
            </section>
        </div>

        <section class="panel table-panel">
            <div class="table-row" id="threeSearchTables" style="display: none;">
                <div class="table-box" id="customerAccountTable">
                    <h3>Customer Account</h3>
                    <table class="table search-table">
                        <thead>
                            <tr>
                                <th>Account</th>
                                <th>Balance</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Customer Accounts will be dynamically added here -->
                        </tbody>
                    </table>
                </div>
                <div class="table-box" id="customerTransactionHistoryTable">
                    <h3>Transaction History</h3>
                    <table class="table search-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Recipient/Sender</th>
                                <th>Type</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Recent customer transactions will be dynamically added here -->
                        </tbody>
                    </table>
                </div>
                <div class="table-box" id="customerBillsTable">
                    <h3>Payment Deadlines</h3>
                    <table class="table search-table">
                        <thead>
                            <tr>
                                <th>Payee</th>
                                <th>Amount</th>
                                <th>Deadline</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Customer bills will be dynamically added here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <datalist id="customerSuggestions">
            <option value="John Doe">
            <option value="Jane Smith">
            <option value="Michael Brown">
            <option value="Jim Bean">
            <option value="CUST-1001">
            <option value="CUST-1002">
        </datalist>
    </div>

    <script src="app.js"></script>
</body>
</html>
