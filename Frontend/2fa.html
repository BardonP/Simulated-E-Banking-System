<!DOCTYPE html>
<html>
<head>
    <title>Multi-Factor Authentication</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="images/summit_bank_logo.png">
</head>
<body>
    <h1>
        <img src="images/summit_bank_logo.png" alt="Logo" class="logo"> Summit Bank
        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider round"></span>
        </label>
    </h1>
    
    <div id="usernameStep">

            <p>Enter your username to receive a verification code.</p>

            <div class="form-group">
                <label for="mfaUsername">Username:</label>

                <input type="text" id="mfaUsername" placeholder="Enter username">
            </div>

            <button type="button" id="sendCodeBtn">Send Code</button>

        </div>

        <p id="mfaMessage"></p>

        <div id="codeStep" style="display: none;">

            <p>Check your email for a 6-digit verification code.</p>

            <div class="form-group">
                <label for="mfaCode">Code:</label>

                <input type="text" id="mfaCode" placeholder="Enter 6-digit code" maxlength="6">
            </div>

            <button type="button" id="verifyMfaBtn">Verify Code</button>

        </div>

        <div id="resetStep" style="display: none;">

            <div class="form-group">
                <label for="newPwd">New password:</label>
                <input type="password" id="newPwd" placeholder="Enter new password">
            </div>

            <div class="form-group">
                <label for="confirmPwd">Confirm password:</label>
                <input type="password" id="confirmPwd" placeholder="Confirm new password">
            </div>

            <button type="button" id="verifypwdBtn">Submit</button>

        </div>

        <a href="index.html"><button id="loginBtn">Back to Login</button></a>

    </section>


    <script src="app.js"></script>
</body>
</html>
