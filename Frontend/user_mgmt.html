<!DOCTYPE html>
<html>
<head>
    <title>User Management</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="images/summit_bank_logo.png">
</head>
<body>
    <header>
        <nav class="top-nav">
            <div class="nav-logo">
                <img src="images/summit_bank_logo.png" alt="Logo" class="logo">
            </div>
            <div class="nav-links">
                <a href="admin.html">Dashboard</a>
                <a href="user_mgmt.html">Users</a>
                <a href="reports.html">Reports</a>
                <a href="index.html" id="Logout">Logout</a>
            </div>
        </nav>
    </header>

    <div class="dashboard-wrapper">
        <section class="panel welcome-panel">
            <h2>User Management</h2>
        </section>

        <div class="dashboard-main">
            <section class="panel table-panel">
                <h3>Add User</h3>
                <div class="textbox-form-group">
                    <label for="enterUser">Enter User:</label>
                    <input type="text" id="enterUser" class="textbox-form-input" placeholder="Enter user name">
                </div>
                <div class="textbox-form-group">
                    <label for="role">Assign Role:</label>
                    <select id="role" class="textbox-form-input">
                        <option value="" disabled selected>Select role</option>
                        <option value="customer">Customer</option>
                        <option value="banker">Banker</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button class="submit-button">Submit</button>
            </section>
        </div>

        <section class="panel table-panel">
            <h3>Password Reset</h3>
            <table class="table user-reset-table">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Status</th>
                        <th class="table-action-header"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td></td>
                        <td></td>
                        <td class="action-cell"><button class="reset-button">Reset</button></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td></td>
                        <td class="action-cell"><button class="reset-button">Reset</button></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td></td>
                        <td class="action-cell"><button class="reset-button">Reset</button></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
