<!DOCTYPE html>
<html>
<head>
    <title>Administrator Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="images/summit_bank_logo.png">
</head>
<body>
    <header>
        <nav class="top-nav">
            <div class="nav-logo">
                <img src="images/summit_bank_logo.png" alt="Logo" class="logo">
            </div>
            <div class="nav-links">
                <a href="admin.html">Dashboard</a>
                <a href="user_mgmt.html">Users</a>
                <a href="reports.html">Reports</a>
                <a href="index.html" id="Logout">Logout</a>
                <label class="switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider round"></span>
                </label>
            </div>
        </nav>
    </header>

    <div class="dashboard-wrapper">
        <section class="panel welcome-panel">
            <h2 id="welcomeMsg"></h2>
        </section>

        <section class="panel table-panel">
            <h3>System Activity Logs:</h3>
            <table class="table" id="systemLogsTable">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>User</th>
                        <th>Action</th>
                        <th>Flag</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- System logs will be dynamically added here -->
                </tbody>
            </table>
        </section>

        <section class="panel search-panel">
            <h4 id="currentTransferLimit"></h4>
            <div class="textbox-form-group">
                <label>System Transfer Limit:</label>
                <input type="text" class="textbox-form-input" id="limitAmount" placeholder="Limit">
                <button class="submit-button" id="updateLimitBtn">Update</button>
            </div>
        </section>

        <section class="panel actions-panel">
            <div class="dashBtnRow">
                <a href="user_mgmt.html"><button class="dashBtn">User Management</button></a>
                <button class="dashBtn" id="generateReportBtn">Generate Reports</button>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
