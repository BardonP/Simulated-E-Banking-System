<!DOCTYPE html>
<html>
<head>
    <title>Summit Bank Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="images/summit_bank_logo.png">
</head>
<body>
    <h1><img src="images/summit_bank_logo.png" alt="Logo" class="logo"> Summit Bank</h1>

    <form>
        <div class="form-group">
            <label for="username">Username: &nbsp;</label>
            <input type="text" id="username" name="username" placeholder="Enter your username"><br>
        </div>
        <div class="form-group password-group">
            <label for="pwd">Password: &nbsp;</label>
            <input type="password" id="pwd" name="pwd" placeholder="Enter your password"><br>
        </div>
        <div>
            <button type="button" id="resetBtn">Reset Password</button>
        </div>
    </form>

    <button id="loginBtn">Login</button>

    <!-- temporary -->
    <a href="customer.html">Go to Customer Dashboard</a>
    
    <a href="banker.html">Go to Banker Dashboard</a>

    <a href="admin.html">Go to Admin Dashboard</a>
    
    <script src="app.js"></script>
</body>
</html>
